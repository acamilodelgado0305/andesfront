<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapictrl</title>
    <!-- Pre-paint del tema: aplica el modo oscuro ANTES de montar React para
         evitar el parpadeo (FOUC). Lee la caché local `qc-theme` y resuelve
         'system' contra prefers-color-scheme. Debe mantenerse en sintonía con
         src/services/theme/themeService.js -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('qc-theme') || 'system';
          var isDark = mode === 'dark' ||
            (mode === 'system' && window.matchMedia &&
             window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (isDark) root.classList.add('dark');
          root.style.colorScheme = isDark ? 'dark' : 'light';
          root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        } catch (e) { /* sin acceso a localStorage → tema claro por defecto */ }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loader inicial: visible mientras se descarga y monta la app.
           React reemplaza el contenido de #root al renderizar, así que desaparece solo. -->
      <div id="initial-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--qc-bg,#f9fafb);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">
        <img src="/images/logo.png" alt="Rapictrl" style="height:48px;width:48px;object-fit:contain;" />
        <div style="width:38px;height:38px;border:4px solid #e5e7eb;border-top-color:#1d4ed8;border-radius:50%;animation:qc-initial-spin .8s linear infinite;"></div>
        <p style="font-size:13px;color:#9ca3af;margin:0;">Cargando…</p>
      </div>
      <style>@keyframes qc-initial-spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
