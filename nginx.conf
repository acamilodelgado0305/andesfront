server {
    listen 90;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Archivos con hash en el nombre (chunks JS/CSS): nunca cambian de contenido,
    # así que se cachean para siempre. Si se pide uno que ya no existe tras un
    # deploy, devolvemos 404 real (no el index.html) para que el front lo detecte.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html y rutas SPA: NUNCA cachear, para que tras un deploy el navegador
    # siempre reciba el HTML nuevo que apunta a los chunks nuevos (evita la
    # pantalla en blanco al refrescar con una versión cacheada).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
